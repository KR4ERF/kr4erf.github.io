name: Import Flatpak Release

on:
  repository_dispatch:
    types: [import-flatpak]

# Ensure only one deployment or import runs at a time to prevent race conditions on flatpak-repo
concurrency:
  group: "flatpak-repo-write"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  import-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flatpak & OSTree
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree gnupg

      - name: Import GPG Key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}

      - name: Download Flatpak Bundle
        env:
          DOWNLOAD_URL: ${{ github.event.client_payload.download_url }}
        run: |
          echo "Downloading from: $DOWNLOAD_URL"
          curl -fL "$DOWNLOAD_URL" -o incoming.flatpak
          
          SIZE=$(stat -c%s "incoming.flatpak")
          echo "Downloaded size: $SIZE bytes"
          if [ "$SIZE" -eq 0 ]; then
            echo "Error: Downloaded file is empty!"
            exit 1
          fi

      - name: Initialize / Sync Flatpak Repo from flatpak-repo
        run: |
          mkdir -p work/flatpak/repo
          git fetch origin flatpak-repo || true
          
          if git ls-tree -d origin/flatpak-repo:dl/flatpak/repo > /dev/null 2>&1; then
            echo "Found existing flatpak repository on flatpak-repo, syncing..."
            # Extract directly into the target directory, stripping 'dl/flatpak/repo/' from the paths
            git archive origin/flatpak-repo dl/flatpak/repo | tar -x --strip-components=3 -C work/flatpak/repo/
          else
            echo "No existing flatpak repository found. Initializing fresh."
          fi

          if [ ! -f work/flatpak/repo/config ]; then
            ostree init --mode=archive-z2 --repo=work/flatpak/repo
          fi

      - name: Import Bundle into Repo
        run: |
          # Use the Key ID provided by the import-gpg action
          KEY_ID="${{ steps.import-gpg.outputs.keyid }}"
          flatpak build-import-bundle --gpg-sign=$KEY_ID work/flatpak/repo incoming.flatpak
          flatpak build-update-repo --generate-static-deltas --gpg-sign=$KEY_ID work/flatpak/repo

      - name: Push Flatpak Repo to flatpak-repo
        run: |
          # 1. Check if the branch exists on the remote
          if git ls-remote --exit-code --heads https://github.com/${{ github.repository }}.git flatpak-repo; then
            echo "Branch exists, cloning..."
            git clone --depth 1 --branch flatpak-repo https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git flatpak-repo-branch
          else
            echo "Branch does not exist, initializing empty repository..."
            mkdir flatpak-repo-branch
            cd flatpak-repo-branch
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout --orphan flatpak-repo
            cd ..
          fi

          # 2. Update the dl/flatpak/repo folder using rsync to remove deleted/pruned files
          mkdir -p flatpak-repo-branch/dl/flatpak/repo
          rsync -a --delete work/flatpak/repo/ flatpak-repo-branch/dl/flatpak/repo/

          # 3. Commit and push
          cd flatpak-repo-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dl/flatpak/repo/

          APP_ID="${APP_ID:-UnknownApp}"
          git commit -m "Import flatpak binary: $APP_ID" || echo "No changes"
          git push -u origin flatpak-repo
        env:
          APP_ID: ${{ github.event.client_payload.app_id }}
