name: Import Flatpak Release

on:
  repository_dispatch:
    types: [import-flatpak]
    # Expected client_payload:
    # {
    #   "download_url": "https://github.com/user/repo/releases/download/v1.0/app.flatpak",
    #   "app_id": "com.example.App"
    # }

# Ensure only one deployment or import runs at a time to prevent race conditions on gh-pages
concurrency:
  group: "gh-pages-write"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  import-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flatpak & OSTree
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak ostree gnupg

      - name: Import GPG Key and Extract IDs
        run: |
          echo "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Extract the Key ID from the imported private key
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec:' | head -n1 | cut -d':' -f5)
          # Export the public key in Base64
          PUB_KEY=$(gpg --export $KEY_ID | base64 -w0)

          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          echo "GPG_PUB_KEY=$PUB_KEY" >> $GITHUB_ENV

      - name: Download Flatpak Bundle
        run: |
          URL="${{ github.event.client_payload.download_url }}"
          echo "Downloading from: $URL"
          
          # -f makes curl fail on server errors; -L follows redirects
          curl -fL "$URL" -o incoming.flatpak
          
          # Verify the file is not empty
          SIZE=$(stat -c%s "incoming.flatpak")
          echo "Downloaded size: $SIZE bytes"
          if [ "$SIZE" -eq 0 ]; then
            echo "Error: Downloaded file is empty!"
            exit 1
          fi

      - name: Initialize / Sync Flatpak Repo from gh-pages
        run: |
          mkdir -p work/flatpak
          git fetch origin gh-pages || true
          
          # Use git archive to safely extract the dl/flatpak folder if it exists
          if git ls-tree -d origin/gh-pages:dl/flatpak > /dev/null 2>&1; then
            echo "Found existing flatpak repository on gh-pages, syncing..."
            git archive origin/gh-pages dl/flatpak | tar -x
            mv dl/flatpak/* work/flatpak/
            rm -rf dl
          else
            echo "No existing flatpak repository found. Initializing fresh."
          fi

          if [ ! -f work/flatpak/config ]; then
            ostree init --mode=archive-z2 --repo=work/flatpak
          fi

      - name: Import Bundle into Repo
        run: |
          flatpak build-import-bundle --gpg-sign=${{ env.GPG_KEY_ID }} work/flatpak incoming.flatpak
          flatpak build-update-repo --generate-static-deltas --gpg-sign=${{ env.GPG_KEY_ID }} work/flatpak

      - name: Push Flatpak Repo to gh-pages
        run: |
          # 1. Clone the branch specifically to avoid 'origin' issues and ensure we have all files
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-branch

          # 2. Update the dl/flatpak folder inside the checkout
          mkdir -p gh-pages-branch/dl/flatpak
          cp -r work/flatpak/* gh-pages-branch/dl/flatpak/

          # 3. Commit and push (this preserves existing HTML/CSS files)
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dl/flatpak/
          git commit -m "Import flatpak binary: ${{ github.event.client_payload.app_id }}" || echo "No changes"
          git push origin gh-pages

