name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Ensure only one deployment or import runs at a time to prevent race conditions on gh-pages
concurrency:
  group: "gh-pages-write"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site and inject Flatpak binaries
        run: |
          set -o pipefail

          # 1. Fetch the binary database from gh-pages branch
          git fetch origin gh-pages || true

          # 2. Build the Pelican site (copies static files like .flatpakrepo)
          make publish

          # 3. Merge the binaries into the final output
          if git ls-tree -d origin/gh-pages:dl/flatpak/repo > /dev/null 2>&1; then
            echo "Merging software binaries from gh-pages archive into output/..."
            git archive origin/gh-pages dl/flatpak/repo | tar -x -C output/
            echo "Merge complete."
          else
            echo "No binaries found on gh-pages branch to merge."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
